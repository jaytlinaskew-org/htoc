<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-labelledby="mtitle mdesc">
  <title id="mtitle">PRISM mark</title>
  <desc id="mdesc">Fancy app icon: glass prism, data cloud, severity output.</desc>
  <defs>
    <linearGradient id="mBg" x1="0%" y1="0%" x2="100%" y2="100%">
