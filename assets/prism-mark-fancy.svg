    <path d="M58 32 L80 20" stroke="#90CAF9" stroke-width="0.4"/>
    <path d="M58 40 L80 32" stroke="#90CAF9" stroke-width="0.4"/>
    <path d="M58 50 L80 50" stroke="#90CAF9" stroke-width="0.4"/>
    <path d="M58 58 L80 66" stroke="#90CAF9" stroke-width="0.4"/>
  </g>
