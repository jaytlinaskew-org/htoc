    </linearGradient>
    <radialGradient id="mGlow" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#5C6BC0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1A237E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mPrismF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#9FA8DA"/>
    </linearGradient>
    <linearGradient id="mPrismS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B8C2F0"/>
      <stop offset="100%" stop-color="#6D7DD6"/>
    </linearGradient>
    <linearGradient id="mPrismT" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#9FA8DA"/>
    </linearGradient>
    <linearGradient id="mBarR" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FF8A80"/><stop offset="100%" stop-color="#C62828"/></linearGradient>
    <linearGradient id="mBarO" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FFCC80"/><stop offset="100%" stop-color="#E65100"/></linearGradient>
    <linearGradient id="mBarY" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FFF59D"/><stop offset="100%" stop-color="#F9A825"/></linearGradient>
    <linearGradient id="mBarG" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#B9F6CA"/><stop offset="100%" stop-color="#2E7D32"/></linearGradient>
    <filter id="mDrop" x="-3" y="-3" width="70" height="80">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.25"/>
