<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" role="img" aria-labelledby="title desc">
  <title id="title">PRISM logo</title>
  <desc id="desc">PRISM wordmark with prism graphic: raw data enters a prism and emerges as severity-tiered output.</desc>
  <defs>
    <linearGradient id="funnel" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#BBDEFB" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <!-- Data cloud (left) -->
  <g fill="#5C6BC0" opacity="0.85">
    <circle cx="10" cy="28" r="2.2"/>
    <circle cx="4" cy="40" r="1.6"/>
    <circle cx="16" cy="38" r="1.4"/>
  </g>
  <g fill="#E53935" opacity="0.9">
    <circle cx="8" cy="48" r="1.8"/>
    <circle cx="18" cy="26" r="1.3"/>
  </g>
  <g fill="#43A047" opacity="0.9">
    <circle cx="14" cy="18" r="1.5"/>
    <circle cx="22" cy="44" r="1.2"/>
  </g>
  <g fill="#FB8C00" opacity="0.9">
    <circle cx="20" cy="34" r="1.6"/>
  </g>
  <g fill="#78909C" opacity="0.85">
    <circle cx="6" cy="22" r="1.3"/>
    <circle cx="24" cy="30" r="1.1"/>
  </g>
  <!-- Soft funnel into prism -->
  <path d="M26 14 Q34 36 30 58 L44 52 Q48 36 40 12 Z" fill="url(#funnel)"/>
  <!-- Prism (navy frame) -->
  <g stroke="#1A237E" stroke-width="1.4" fill="none" stroke-linejoin="round">
    <path d="M38 8 L70 4 L70 64 L38 60 Z" fill="#FFFFFF" stroke="#1A237E"/>
    <path d="M70 4 L90 10 L90 58 L70 64 Z" fill="#FAFAFA" stroke="#1A237E"/>
    <path d="M38 8 L58 12 L90 10" fill="none"/>
    <path d="M58 12 L90 10 L90 58 L58 60 L38 60 L38 8" fill="none" opacity="0.35"/>
  </g>
  <!-- Spectrum facets on prism front -->
  <g opacity="0.92">
    <polygon points="42,20 64,18 64,32 42,34" fill="#E53935" opacity="0.25"/>
    <polygon points="42,34 64,32 64,44 42,46" fill="#FB8C00" opacity="0.25"/>
    <polygon points="42,46 64,44 64,54 42,56" fill="#FBC02D" opacity="0.28"/>
    <polygon points="42,56 64,54 64,62 42,64" fill="#43A047" opacity="0.3"/>
  </g>
  <!-- Output severity bars (right) -->
  <g transform="translate(98, 10)">
    <rect x="0" y="0" width="36" height="10" rx="3" fill="#E53935"/>
    <rect x="0" y="13" width="36" height="10" rx="3" fill="#FB8C00"/>
    <rect x="0" y="26" width="36" height="10" rx="3" fill="#FBC02D"/>
    <rect x="0" y="39" width="36" height="10" rx="3" fill="#43A047"/>
  </g>
  <!-- Flow arrow -->
  <path d="M88 36 H94" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <path d="M91 32 L98 36 L91 40 Z" fill="#1565C0"/>
  <!-- Wordmark -->
  <text x="150" y="48" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="800" fill="#0D1B2A" letter-spacing="2">PRISM</text>
</svg>
