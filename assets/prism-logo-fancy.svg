<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" width="360" height="90" role="img" aria-labelledby="title desc">
  <title id="title">PRISM logo</title>
  <desc id="desc">PRISM wordmark with stylized data-to-severity flow through a glass prism.</desc>
  <defs>
    <radialGradient id="bgAura" cx="18%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="55%" stop-color="#F5F7FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="funnel" x1="0%" y1="40%" x2="100%" y2="60%">
      <stop offset="0%" stop-color="#7E8EE8" stop-opacity="0.15"/>
      <stop offset="35%" stop-color="#90CAF9" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#B3C8FF" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="prismFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#EEF1FF"/>
      <stop offset="100%" stop-color="#D4DCFA"/>
    </linearGradient>
    <linearGradient id="prismSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C5CEF5"/>
      <stop offset="100%" stop-color="#9FA8DA"/>
    </linearGradient>
    <linearGradient id="prismTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B8C2F0"/>
    </linearGradient>
    <linearGradient id="rayFan" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#5C6BC0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5C6BC0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B2838"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="barOrg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="barYel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <linearGradient id="barGrn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <filter id="softShadow" x="-8" y="-8" width="200" height="120" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#1A237E" flood-opacity="0.12"/>
    </filter>
    <filter id="barShine" x="-2" y="-2" width="50" height="20">
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.3" flood-color="#FFFFFF" flood-opacity="0.5"/>
    </filter>
    <filter id="textShadow" x="-2" y="-2" width="200" height="60">
      <feDropShadow dx="0" dy="1" stdDeviation="0.4" flood-color="#0D1B2A" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- Ambient field -->
  <rect x="0" y="0" width="360" height="90" fill="#FDFDFF"/>
  <ellipse cx="64" cy="45" rx="88" ry="48" fill="url(#bgAura)"/>
  <!-- Light rays (energy leaving prism) -->
  <g opacity="0.55">
    <path d="M100 32 L150 8 L140 6 Z" fill="url(#rayFan)"/>
    <path d="M100 40 L150 32 L140 30 Z" fill="url(#rayFan)"/>
    <path d="M100 50 L150 50 L140 50 Z" fill="url(#rayFan)"/>
    <path d="M100 58 L150 68 L140 64 Z" fill="url(#rayFan)"/>
    <path d="M100 66 L150 86 L140 80 Z" fill="url(#rayFan)"/>
  </g>
  <!-- Data cloud with halos -->
  <g>
    <circle cx="8" cy="32" r="4" fill="#7986CB" opacity="0.2"/>
    <circle cx="8" cy="32" r="1.6" fill="#5C6BC0"/>
    <circle cx="2" cy="46" r="3" fill="#EF5350" opacity="0.15"/>
    <circle cx="2" cy="46" r="1.4" fill="#E53935"/>
    <circle cx="20" cy="24" r="3.5" fill="#66BB6A" opacity="0.18"/>
    <circle cx="20" cy="24" r="1.3" fill="#43A047"/>
    <circle cx="12" cy="18" r="2.5" fill="#7E8EE8" opacity="0.2"/>
    <circle cx="12" cy="18" r="1.1" fill="#5C6BC0"/>
    <circle cx="22" cy="40" r="2.8" fill="#FF9800" opacity="0.2"/>
    <circle cx="22" cy="40" r="1.5" fill="#FB8C00"/>
    <circle cx="4" cy="20" r="2.2" fill="#78909C" opacity="0.2"/>
    <circle cx="4" cy="20" r="1" fill="#607D8B"/>
    <circle cx="16" cy="50" r="2.4" fill="#9FA8DA" opacity="0.22"/>
    <circle cx="16" cy="50" r="1.1" fill="#7986CB"/>
    <circle cx="24" cy="30" r="1.1" fill="#B0BEC5"/>
  </g>
  <path d="M28 12 Q40 40 32 64 L50 58 Q58 40 48 8 Z" fill="url(#funnel)"/>
  <!-- Glass prism group -->
  <g filter="url(#softShadow)">
    <path d="M52 6 L90 2 L90 65 L52 64 Z" fill="url(#prismFront)" stroke="#1A237E" stroke-width="1.1" stroke-linejoin="round"/>
    <path d="M90 2 L116 6 L116 60 L90 65 Z" fill="url(#prismSide)" stroke="#1A237E" stroke-width="1.1" stroke-linejoin="round" opacity="0.98"/>
    <path d="M52 6 L76 3 L116 6" fill="url(#prismTop)" stroke="#1A237E" stroke-width="0.9" stroke-linejoin="round"/>
    <path d="M58 12 L86 8.5" stroke="#FFFFFF" stroke-width="0.7" stroke-linecap="round" opacity="0.9"/>
    <path d="M86 7 L110 9.5" stroke="#FFFFFF" stroke-width="0.5" stroke-linecap="round" opacity="0.65"/>
    <!-- Internal spectrum -->
    <g opacity="0.88">
      <polygon points="58,22 86,18 86,30 58,32" fill="#E53935" fill-opacity="0.22" stroke="none"/>
      <polygon points="58,32 86,30 86,42 58,45" fill="#FB8C00" fill-opacity="0.24" stroke="none"/>
      <polygon points="58,45 86,42 86,52 58,55" fill="#FBC02D" fill-opacity="0.28" stroke="none"/>
      <polygon points="58,55 86,52 86,62 58,64" fill="#43A047" fill-opacity="0.26" stroke="none"/>
    </g>
  </g>
  <!-- Output bars -->
  <g transform="translate(120, 8)" filter="url(#barShine)">
    <rect x="0" y="0" width="40" height="12" rx="4" fill="url(#barRed)"/>
    <rect x="0" y="0" width="40" height="4" rx="3" fill="#FFFFFF" fill-opacity="0.35"/>
    <rect x="0" y="16" width="40" height="12" rx="4" fill="url(#barOrg)"/>
    <rect x="0" y="16" width="40" height="4" rx="3" fill="#FFFFFF" fill-opacity="0.3"/>
    <rect x="0" y="32" width="40" height="12" rx="4" fill="url(#barYel)"/>
    <rect x="0" y="32" width="40" height="4" rx="3" fill="#FFFFFF" fill-opacity="0.28"/>
    <rect x="0" y="48" width="40" height="12" rx="4" fill="url(#barGrn)"/>
    <rect x="0" y="48" width="40" height="4" rx="3" fill="#FFFFFF" fill-opacity="0.32"/>
  </g>
  <!-- Flow arrow (glossy) -->
  <g>
    <path d="M108 40 H118" stroke="#3949AB" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M110 40 H118" stroke="#7986CB" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <path d="M115 35 L123 40 L115 45 Z" fill="#1A237E"/>
    <path d="M115 35.5 L121 40 L115 44 Z" fill="#5C6BC0" opacity="0.5"/>
  </g>
  <!-- Wordmark -->
  <text x="180" y="55" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="800" fill="url(#wordGrad)" letter-spacing="3" filter="url(#textShadow)">PRISM</text>
  <line x1="180" y1="64" x2="318" y2="64" stroke="url(#wordGrad)" stroke-width="0.6" stroke-opacity="0.2"/>
</svg>
